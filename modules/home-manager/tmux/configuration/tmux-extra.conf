# Get tmux colors working and osc52 to integrate with system clipboard
set -ag terminal-overrides ",$TERM:Tc,$TERM:osc52=1"

# Scrollback limit
set-option -g history-limit 10000

# Needed to get TMUX to source the correct shell on macOS
set -g default-command "${SHELL}"

# Get osc52 copy-paste working
set-option -g set-clipboard on

# Put status on top
set -g status-position top

# Count windows and panes from 1 not 0
set -g base-index 1
setw -g pane-base-index 1

# enable vi mode
setw -g mode-keys vi

# trigger a notification from bell characters
set -g monitor-bell on

# Disable confirmation for kill-pane
bind-key x kill-pane

# Open new windows in the same directory as the current pane
bind c new-window -c "#{pane_current_path}"

# Move window rightwards or leftwards
bind P swap-window -d -t -1 
bind N swap-window -d -t +1 

# Make copy mode more vim-line
bind -T copy-mode-vi 'v' send-keys -X begin-selection
bind -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle # toggle visual block mode

# tmux.nvim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|n?vim?x?)(-wrapped)?(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

bind -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 5'
bind -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 5'
bind -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 5'
bind -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 5'

bind -T copy-mode-vi M-h resize-pane -L 5
bind -T copy-mode-vi M-j resize-pane -D 5
bind -T copy-mode-vi M-k resize-pane -U 5
bind -T copy-mode-vi M-l resize-pane -R 5

# Custom catppuccin status module for task count
set -gF "@catppuccin_status_custom" \
  "#[fg=#{E:@thm_peach}]#[bg=default]█#[fg=#{E:@thm_crust},bg=#{E:@thm_peach}]󱃔 #{@catppuccin_status_middle_separator}#[fg=#{E:@thm_fg},bg=#{E:@catppuccin_status_module_text_bg}] #(tmux-task-count)#[fg=#{E:@catppuccin_status_module_text_bg}]#[bg=default]█"
set -g status-right "#{E:@catppuccin_status_custom}#{E:@catppuccin_status_session}#{E:@catppuccin_status_host}"
